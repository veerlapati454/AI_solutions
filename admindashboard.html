<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Solutions · Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0C0F;
      color: #EDF2F7;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #0A0C0F;
      --surface: #13171C;
      --surface-2: #1B2128;
      --border: rgba(237,242,247,0.08);
      --text: #EDF2F7;
      --text-dim: rgba(237,242,247,0.65);
      --text-dimmer: rgba(237,242,247,0.4);
      --accent: #FF6B47;
      --accent-soft: rgba(255,107,71,0.12);
      --accent-glow: rgba(255,107,71,0.25);
      --green: #4ADE80;
      --amber: #FBBF24;
      --red: #F87171;
      --slate: #94A3B8;
      --display: 'Inter', 'Segoe UI', sans-serif;
      --mono: 'Space Mono', monospace;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    @media (prefers-reduced-motion: reduce){
      *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
    }
    ::selection{ background:var(--accent); color:#0A0C0F; }
    .dashboard-root { display: flex; min-height: 100vh; width: 100%; max-width: 100vw; position:relative; }
    .dashboard-root::before{
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:radial-gradient(circle at 20% 30%, rgba(255,107,71,0.04) 0%, transparent 60%),
                       radial-gradient(circle at 80% 70%, rgba(255,107,71,0.03) 0%, transparent 50%);
    }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 40; display: none; backdrop-filter: blur(4px);
    }
    .sidebar-overlay.show { display: block; animation: fadeIn .25s var(--ease); }
    @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 20px 16px 16px; position: fixed; left: 0; top: 0;
      height: 100vh; overflow-y: auto; z-index: 30;
      backdrop-filter: blur(8px);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      padding: 0 4px;
      position: relative;
    }
    .brand { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
    }
    .brand-logo-slot { 
      height: 50px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      width: 100%;
    }
    .brand-logo-img { 
      height: 45px; 
      width: auto; 
      max-width: 200px; 
      object-fit: contain; 
      display: block; 
    }
    .brand-logo-fallback {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      border: 1px dashed rgba(255,107,71,0.5);
      color: var(--accent);
      align-items: center;
      justify-content: center;
      display: none;
      flex-shrink: 0;
    }
    .brand-wordmark{ font-family:var(--display); font-size:15px; font-weight:800; letter-spacing:-0.01em; color:var(--text); display:none; }
    .brand-wordmark em{ font-style:normal; color:var(--accent); }
    .close-btn {
      display: none; background: none; border: none; color: var(--text-dim);
      font-size: 18px; padding: 4px 8px; cursor:pointer;
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    .sidebar-section-label {
      font-family:var(--mono);
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-dimmer); text-transform: uppercase;
      margin: 14px 8px 8px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      background: none; border: none; width: 100%;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-dim); font-size: 13.5px; font-weight: 500;
      text-align: left; transition: all .2s ease;
      position: relative; cursor:pointer;
    }
    .nav-item:hover { background: rgba(255,107,71,0.08); color: var(--text); transform:translateX(2px); }
    .nav-item.nav-active { background: var(--accent-soft); color: var(--accent); font-weight: 600; box-shadow: 0 0 12px var(--accent-glow); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: var(--accent); color: #0A0C0F; font-family:var(--mono); font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; margin-top: 16px; margin-bottom: 4px;
      border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border);
    }
    .sidebar-user-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 13px; font-weight: 800; text-transform: uppercase;
    }
    .sidebar-user-info { min-width: 0; flex: 1; }
    .sidebar-user-name { font-size: 12.5px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform:capitalize; }
    .sidebar-user-email { font-size: 11px; color: var(--text-dimmer); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-full-btn {
      margin-top: 8px; width: 100%; padding: 11px; border-radius: 10px;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25);
      color: #FCA5A5; font-family:var(--mono); font-size: 12px; font-weight: 700; letter-spacing:.03em; text-transform:uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s ease; text-decoration: none; cursor: pointer;
    }
    .logout-full-btn:hover { background: rgba(248,113,113,0.15); }
    .main-content { flex: 1; min-width: 0; max-width: 100%; display: flex; flex-direction: column; margin-left: 260px; position:relative; z-index:1; }
    .topbar {
      position: sticky; top: 0; z-index: 25;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 24px;
      background: rgba(10,12,15,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-wrap: nowrap;
      min-height: 60px;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex-shrink: 1; }
    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 4px;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      align-items: center; flex-shrink: 0; cursor:pointer;
    }
    .hamburger span { width: 16px; height: 2px; background: var(--text); border-radius: 2px; }
    .page-title { 
      min-width: 0; 
      display: flex; 
      align-items: baseline; 
      gap: 12px;
      white-space: nowrap;
    }
    .page-title h1 { 
      font-family:var(--display); 
      text-transform:uppercase; 
      letter-spacing:-.01em; 
      font-size: 20px; 
      font-weight: 700; 
      margin: 0; 
      background: linear-gradient(135deg, #EDF2F7 0%, #94A3B8 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      white-space: nowrap;
    }
    .page-title p { 
      font-size: 12px; 
      color: var(--text-dim); 
      margin: 0; 
      white-space: nowrap;
      -webkit-text-fill-color: var(--text-dim);
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: auto; }
    .search-box { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; min-width: 0; }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 150px; max-width: 100%; min-width: 60px; }
    .search-box input::placeholder { color: var(--text-dimmer); font-size: 11px; }
    .search-icon { font-size: 12px; opacity: 0.7; }
    .icon-btn {
      position: relative; width: 34px; height: 34px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      flex-shrink: 0; cursor:pointer; transition:all .2s ease;
    }
    .icon-btn:hover{ border-color:var(--accent); transform:translateY(-1px); box-shadow:0 0 12px var(--accent-glow); }
    .notif-dot {
      position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
      border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface-2);
      animation: notifPulse 2.2s ease-in-out infinite;
    }
    @keyframes notifPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(248,113,113,.5); } 50%{ box-shadow:0 0 0 4px rgba(248,113,113,0); } }
    .topbar-user { position: relative; flex-shrink: 0; }
    .topbar-user-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 10px 3px 3px;
      transition: border-color .2s ease; cursor:pointer;
    }
    .topbar-user-btn:hover { border-color:var(--accent); }
    .topbar-user-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: #0A0C0F;
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 11px; font-weight: 800; text-transform: uppercase;
    }
    .topbar-user-name { font-size: 11.5px; font-weight: 600; color: var(--text); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform:capitalize; }
    .topbar-user-caret { font-size: 9px; color: var(--text-dimmer); }
    .topbar-user-menu {
      position: absolute; top: calc(100% + 8px); right: 0; width: 220px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      opacity: 0; visibility: hidden; transform: translateY(-6px);
      transition: opacity .2s var(--ease), transform .2s var(--ease), visibility .2s ease;
      z-index: 60;
    }
    .topbar-user.open .topbar-user-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .topbar-user-menu-email { padding: 8px 10px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .topbar-user-menu-email .label { font-family:var(--mono); font-size: 9px; font-weight: 700; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: .05em; }
    .topbar-user-menu-email .value { font-size: 11.5px; font-weight: 600; color: var(--text); margin-top: 2px; word-break: break-all; }
    .topbar-user-menu-item {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 8px 10px; border-radius: 8px;
      background: none; border: none; text-align: left;
      font-size: 11.5px; font-weight: 600; color: var(--text-dim);
      transition: background .15s ease, color .15s ease; cursor:pointer;
    }
    .topbar-user-menu-item:hover { background: rgba(255,107,71,0.08); color: var(--text); }
    .topbar-user-menu-item.danger:hover { background: rgba(248,113,113,0.15); color: #FCA5A5; }

    .content-area { padding: 24px 28px 48px; min-width: 0; max-width: 100%; overflow-x: hidden; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 18px 16px; min-width: 0;
      transition: all .25s ease;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) forwards;
    }
    .stat-card[data-aos] { opacity: 0; animation: none; }
    .stats-grid .stat-card:nth-child(1){ animation-delay:.03s; }
    .stats-grid .stat-card:nth-child(2){ animation-delay:.09s; }
    .stats-grid .stat-card:nth-child(3){ animation-delay:.15s; }
    .stats-grid .stat-card:nth-child(4){ animation-delay:.21s; }
    @keyframes cardPop{ to{ opacity:1; transform:translateY(0); } }
    .stat-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,71,0.08); }
    .stat-accent { border-color:rgba(255,107,71,0.35); background:linear-gradient(145deg, rgba(255,107,71,0.06), var(--surface) 70%); }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .stat-icon { font-size: 18px; filter: drop-shadow(0 0 6px var(--accent-glow)); }
    .stat-delta { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .stat-delta.up { color: var(--green); background: rgba(74,222,128,0.12); }
    .stat-value { font-family:var(--display); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
    .stat-label { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
    .stat-bar { height: 5px; background: rgba(237,242,247,0.06); border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; width:0; background: linear-gradient(90deg, var(--accent), #FF8A6B); border-radius: 999px; transition: width 1.1s var(--ease) .3s; }
    .mid-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 16px; min-width: 0;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) .1s forwards;
    }
    .card[data-aos] { opacity: 0; animation: none; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .card-title { font-family:var(--display); text-transform:uppercase; letter-spacing:.005em; font-size: 15px; font-weight: 700; margin: 0; color: #EDF2F7; }
    .card-sub { font-size: 12px; color: var(--text-dim); margin: 3px 0 0; }
    .table-wrapper { overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
    .runs-table { width: 100%; border-collapse: collapse; min-width: 600px; }
    .runs-table th {
      text-align: left; font-family:var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-dimmer);
      padding: 0 10px 10px; border-bottom: 1px solid var(--border);
    }
    .runs-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tbody tr { transition: background .15s ease; cursor:pointer; }
    .runs-table tbody tr:hover { background: rgba(255,107,71,0.04); }
    .t-name { font-weight: 600; font-size: 13px; }
    .t-sub { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .type-col { color: var(--text-dim); }
    .date-col { color: var(--text-dim); white-space: nowrap; }
    .budget-col { font-weight: 700; white-space: nowrap; font-family:var(--mono); font-size:12.5px; }
    .region-tag { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .status-badge { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; text-transform:uppercase; letter-spacing:.02em; }
    .status-active { background: rgba(74,222,128,0.12); color: #6EE7A7; }
    .status-field { background: rgba(251,191,36,0.12); color: #FCD34D; }
    .status-complete { background: rgba(148,163,184,0.15); color: #CBD5E1; }
    .status-review { background: rgba(255,107,71,0.12); color: #FF8A6B; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(237,242,247,0.06); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width:0; background: linear-gradient(90deg, var(--accent), #FF8A6B); border-radius: 999px; transition:width 1s var(--ease) .2s; }
    .progress-pct { font-family:var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .activity-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px; transition: background .15s ease; cursor:pointer; }
    .activity-item:hover { background: rgba(255,107,71,0.04); }
    .act-icon { font-size: 17px; flex-shrink: 0; line-height: 1.4; }
    .act-body { flex: 1; min-width: 0; }
    .act-text { font-size: 13px; margin: 0; line-height: 1.5; word-wrap: break-word; }
    .act-time { font-family:var(--mono); font-size: 11px; color: var(--text-dimmer); margin-top: 4px; display: block; }
    .team-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .team-item { display: flex; align-items: center; gap: 12px; padding: 10px 6px; border-radius: 10px; transition: background .15s ease; cursor:pointer; }
    .team-item:hover { background: rgba(255,107,71,0.04); }
    .member-avatar {
      position: relative; width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .online-dot { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); }
    .dot-active { background: var(--green); }
    .dot-away { background: var(--amber); }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-role { font-size: 11.5px; color: var(--text-dimmer); margin-top: 1px; }
    .member-projects { text-align: center; flex-shrink: 0; }
    .proj-count { display: block; font-family:var(--display); font-size: 15px; color: var(--accent); }
    .proj-label { display: block; font-family:var(--mono); font-size: 9.5px; color: var(--text-dimmer); text-transform:uppercase; }
    .milestone-list { display: flex; flex-direction: column; padding: 0; margin: 0; }
    .milestone-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px; position: relative; transition: background .15s ease; cursor:pointer; }
    .milestone-item:hover { background: rgba(255,107,71,0.04); }
    .ms-date { width: 34px; flex-shrink: 0; text-align: center; }
    .ms-date span { display: block; }
    .ms-date span:first-child { font-family:var(--mono); font-size: 9.5px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    .ms-date span:last-child { font-family:var(--display); font-size: 16px; }
    .ms-line { width: 2px; align-self: stretch; display: flex; justify-content: center; flex-shrink: 0; }
    .ms-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 4px; }
    .ms-body { flex: 1; min-width: 0; }
    .ms-event { font-size: 13px; font-weight: 600; }
    .ms-project { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .ms-tag { font-family:var(--mono); font-size: 9.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(248,113,113,0.18); color: #FCA5A5; flex-shrink: 0; align-self: flex-start; text-transform:uppercase; }
    .ms-done-tag { background: rgba(74,222,128,0.12); color: #6EE7A7; }
    .ms-done .ms-event { text-decoration: line-through; color: var(--text-dimmer); }
    .donut-chart { display: flex; justify-content: center; margin: 6px 0 14px; cursor:pointer; }
    .donut-svg { width: 150px; height: 150px; max-width: 100%; }
    .donut-svg circle[stroke-dasharray] { stroke-dasharray: 0 212; transition: stroke-dasharray 1.2s var(--ease) .2s; }
    .donut-svg.drawn circle:nth-child(2) { stroke-dasharray: 62 212; }
    .donut-svg.drawn circle:nth-child(3) { stroke-dasharray: 46 212; }
    .donut-svg.drawn circle:nth-child(4) { stroke-dasharray: 40 212; }
    .donut-svg.drawn circle:nth-child(5) { stroke-dasharray: 34 212; }
    .donut-svg.drawn circle:nth-child(6) { stroke-dasharray: 30 212; }
    .donut-num { font-family:var(--display); font-size: 21px; fill: var(--text); font-weight: 700; }
    .donut-label { font-family:var(--mono); font-size: 8.5px; fill: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.06em; }
    .legend-list { display: flex; flex-direction: column; gap: 9px; padding: 0; margin: 0; }
    .legend-item { display: flex; align-items: center; gap: 9px; padding: 4px 6px; border-radius: 8px; cursor:pointer; }
    .legend-item:hover { background: rgba(255,107,71,0.04); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    try {
      const raw = localStorage.getItem('user');

      if (!raw || !isAuthenticated) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }
  
  function usernameFromEmail(email) { 
    if (!email) return '';
    return email.includes('@') ? email.split('@')[0] : email;
  }
  
  function getInitial(email) {
    if (!email) return '?';
    return email.charAt(0).toUpperCase();
  }

  function animateStatBars() {

  // ─── RENDER FUNCTIONS ───
  function renderDashboard() {
    const stats = [
      { icon: "⊚", value: adminStats.totalUsers.toLocaleString(), label: "Total Users", change: "+12.4%", bar: 85, accent: true },
      { icon: "◉", value: adminStats.activeUsers.toLocaleString(), label: "Active Users", change: "+8.2%", bar: 66 },
      { icon: "⊞", value: adminStats.totalPartners.toLocaleString(), label: "Partners", change: "+3", bar: 70 },
      { icon: "⊟", value: fmt(adminStats.totalRevenue), label: "Revenue", change: "+$24K", bar: 90, accent: true },
      { icon: "✓", value: adminStats.pendingApprovals, label: "Pending Approvals", change: "+5", bar: 45 },
      { icon: "▤", value: adminStats.serverUptime + "%", label: "Uptime", change: "99.97%", bar: 95 }
    ];

    const statsHtml = stats.map((s, i) =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" data-aos="fade-up" data-aos-delay="${i * 60}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span><span class="stat-delta up">${s.change}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${s.bar}"></div></div>
      </div>`
    ).join("");

    // User growth chart
    const maxGrowth = Math.max(...userGrowthData);
    let growthLines = "", growthPoints = "", growthPolygon = "10,190 ";
    userGrowthData.forEach((d, i) => {
      const x = 10 + i * 40;
      const y = 190 - (d / maxGrowth) * 170;
      growthPolygon += `${x},${y} `;
      if (i < userGrowthData.length - 1) {
        const x2 = x + 40;
        const y2 = 190 - (userGrowthData[i + 1] / maxGrowth) * 170;
        growthLines += `<line class="growth-line" style="animation-delay:${i*0.03}s" x1="${x}" y1="${y}" x2="${x2}" y2="${y2}" stroke="#FF6B47" stroke-width="2.5" stroke-linecap="round"/>`;
      }
      growthPoints += `<circle class="growth-point" style="animation-delay:${i*0.04}s" cx="${x}" cy="${y}" r="4" fill="#FF6B47" stroke="#0A0C0F" stroke-width="1.5"/>`;
    });
    growthPolygon += "490,190";
    const months = ["J","F","M","A","M","J","J","A","S","O","N","D"];
    const monthLabels = months.map((m, i) => `<text x="${10 + i * 40}" y="195" fill="rgba(237,242,247,0.3)" font-size="10">${m}</text>`).join("");

    // Revenue bars
    const maxRev = Math.max(...revenueData);
    const revBars = revenueData.map((d, i) => {
      const x = 10 + i * 40;
      const h = (d / maxRev) * 170;
      return `<rect class="bar-animate" style="animation-delay:${i*0.03}s" x="${x - 8}" y="${190 - h}" width="16" height="${h}" rx="3" fill="${d > 500 ? "#FF6B47" : "rgba(255,107,71,0.5)"}"/>`;
    }).join("");

    // Donut chart
    const totalUsers = userDistribution.reduce((s, p) => s + p.value, 0);
    let acc = 0;
    const donutPaths = userDistribution.map((item) => {
      const start = acc;
      const end = start + (item.value / totalUsers) * Math.PI * 2;
      const x1 = 60 + 45 * Math.cos(start), y1 = 60 + 45 * Math.sin(start);
      const x2 = 60 + 45 * Math.cos(end), y2 = 60 + 45 * Math.sin(end);
      const large = end - start > Math.PI ? 1 : 0;
      acc = end;
      return `<path class="donut-path" style="animation-delay:${Math.random()*0.1}s" d="M ${x1} ${y1} A 45 45 0 ${large} 1 ${x2} ${y2} L 60 60" fill="${item.color}" opacity="0.9"/>`;
    }).join("");

    const legendItems = userDistribution.map(l =>
      `<li class="legend-item" onclick="go404()"><span class="legend-dot" style="background:${l.color}"></span><span class="legend-label">${l.label}</span><span class="legend-count">${l.value.toLocaleString()}</span></li>`

    // Region distribution
    const maxRegion = Math.max(...regionDistribution.map(r => r.value));

        <div class="region-header"><span class="region-label">${region.label}</span><span class="region-value">${region.value} deployments</span></div>

      </div>`
    ).join("");

    // Pending approvals
    const approvalItems = pendingApprovals.map(req =>
      `<li class="activity-item" onclick="go404()">
        <span class="act-icon">⏳</span>
        <div class="act-body">
          <div class="act-text"><strong>${req.user}</strong> · ${req.type}</div>

        <span style="font-family:var(--mono);font-size:10px;color:${req.priority === 'high' ? '#F87171' : req.priority === 'medium' ? '#FBBF24' : '#94A3B8'}">${req.priority}</span>

    ).join("");

    const alertItems = systemAlerts.map(a =>
      `<div class="activity-item" onclick="go404()">
        <span class="act-icon">${a.type === "warning" ? "⚠️" : a.type === "error" ? "🔴" : a.type === "success" ? "✅" : "ℹ️"}</span>
        <div class="act-body"><div class="act-text">${a.message}</div><span class="act-time">${a.time}</span></div>
      </div>`
    ).join("");

    // Recent users table
    const userRows = recentUsers.map(u =>
      `<tr onclick="go404()">
        <td><div class="t-name">${u.name}</div><div class="t-sub">${u.email}</div></td>
        <td><span class="region-tag" style="color:#FF6B47;border-color:#FF6B47;">${u.role}</span></td>
        <td><span class="status-badge ${statusColors[u.status]}">${u.status}</span></td>
        <td class="date-col">${u.joinDate}</td>
        <td><span style="color:var(--accent);font-weight:700">${u.projects}</span></td>
      </tr>`
    ).join("");

    return `
      <section class="stats-grid" data-aos="fade-up" data-aos-delay="0">${statsHtml}</section>

      <section class="mid-grid">
        <div class="card" data-aos="fade-up" data-aos-delay="100">
          <div class="card-header"><div><h2 class="card-title">User Growth</h2><p class="card-sub">Monthly new sign-ups</p></div></div>

            </svg>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-delay="150">
          <div class="card-header"><div><h2 class="card-title">Revenue</h2><p class="card-sub">Monthly ($000s)</p></div></div>
          <div class="chart-container">
            <svg viewBox="0 0 500 200" class="chart-svg" style="width:100%;height:auto;">${revBars}${monthLabels}</svg>
          </div>

    `;
  }

  const pageRenderers = {
    dashboard: renderDashboard,
    users: renderUsers,
    partners: renderPartners,
    approvals: renderApprovals,
    metrics: renderMetrics,
    revenue: renderRevenue,
    logs: renderLogs,
    settings: renderSettings
  };

  // ─── NAVIGATION ───
  function renderNav() {
    const mainItems = navItems.slice(0, 3);
    const mgmtItems = navItems.slice(3);
    function itemHtml(item) {
      const badge = item.id === "approvals" ? `<span class="nav-badge">${pendingApprovals.length}</span>` : "";
      return `<button class="nav-item ${state.activeNav === item.id ? "nav-active" : ""}" data-nav="${item.id}">
        <span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</button>`;
    }
    document.getElementById("nav-main").innerHTML = mainItems.map(itemHtml).join("");
    document.getElementById("nav-management").innerHTML = mgmtItems.map(itemHtml).join("");
  }

  function renderPage() {
    const page = pageMap[state.activeNav];
    document.getElementById("page-title-text").textContent = page.title;
    document.getElementById("page-sub-text").textContent = page.sub;
    document.getElementById("content-area").innerHTML = pageRenderers[state.activeNav]();
    renderNav();
    const settingsLogoutBtn = document.getElementById("settings-logout-btn");
    if (settingsLogoutBtn) settingsLogoutBtn.addEventListener("click", logout);
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
    animateStatBars();
    initAOS();
  }

  function navigateTo(id) {
    state.activeNav = id;
    closeSidebar();
    closeTopbarUserMenu();
    renderPage();
  }

  function openSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-open");
    document.getElementById("sidebar-overlay").classList.add("show");
  }
  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-open");
    document.getElementById("sidebar-overlay").classList.remove("show");
  }
  function closeTopbarUserMenu() {
    document.getElementById("topbar-user").classList.remove("open");
  }

  // ─── EVENT BINDING ───
  document.getElementById("hamburger-btn").addEventListener("click", openSidebar);
  document.getElementById("close-sidebar-btn").addEventListener("click", closeSidebar);
  document.getElementById("sidebar-overlay").addEventListener("click", closeSidebar);
  document.getElementById("notif-btn").addEventListener("click", go404);
  document.getElementById("logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-user-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    document.getElementById("topbar-user").classList.toggle("open");
  });
  document.addEventListener("click", closeTopbarUserMenu);

  document.addEventListener("click", function(e) {
    const navBtn = e.target.closest("[data-nav]");
    if (navBtn) { navigateTo(navBtn.getAttribute("data-nav")); return; }
    const filterBtn = e.target.closest(".user-filter-btn");
    if (filterBtn) { state.userFilter = filterBtn.getAttribute("data-role"); renderPage(); return; }
    const toggle = e.target.closest("[data-toggle]");
    if (toggle) {
      const key = toggle.getAttribute("data-toggle");
      state.settings[key] = !state.settings[key];
      renderPage();
      return;
    }
  });

  document.addEventListener("input", function(e) {
    if (e.target && e.target.id === "partnerSearchInput") {
      state.partnerSearch = e.target.value;
      const caretPos = e.target.selectionStart;
      renderPage();
      const input = document.getElementById("partnerSearchInput");
      if (input) { input.focus(); input.setSelectionRange(caretPos, caretPos); }
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target && e.target.id === "lang-select") {
      state.settings.language = e.target.value;
    }
  });

  // ─── INIT ───
  paintUserChrome();
  renderPage();
</script>
</body>
</html>
