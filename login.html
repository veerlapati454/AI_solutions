<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0B0E14;
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      color: #F6F4EE;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(255,107,71,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(255,194,75,0.05) 0%, transparent 50%);
    }

    :root {
      --ink: #0B0E14;
      --ink-soft: #131722;
      --ink-soft-2: #171C29;
      --paper: #F6F4EE;
      --coral: #FF6B47;
      --amber: #FFC24B;
      --line: rgba(246,244,238,0.12);
      --text-dim: rgba(246,244,238,0.62);
      --display: 'Space Grotesk', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      position: relative;
    }

    .back-home {
      position: absolute;
      top: 0;
      left: 20px;
      color: var(--text-dim);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .back-home:hover {
      color: var(--paper);
      border-color: var(--line);
      background: rgba(255,255,255,0.03);
    }
    .back-home i {
      font-size: 1rem;
    }

    .login-container {
      background: var(--ink-soft);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 48px 40px 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--coral), var(--amber));
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-logo h1 span {
      color: var(--coral);
    }
    .login-logo p {
      color: var(--text-dim);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .role-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      background: var(--ink-soft-2);
      border-radius: 12px;
      padding: 4px;
      border: 1px solid var(--line);
    }
    .role-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    .role-btn.active {
      background: var(--coral);
      color: var(--ink);
      box-shadow: 0 4px 16px rgba(255, 107, 71, 0.3);
    }
    .role-btn:hover:not(.active) {
      color: var(--paper);
      background: rgba(255, 255, 255, 0.05);
    }
    .role-btn i {
      margin-right: 8px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .form-group .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--ink-soft-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .form-group .input-wrapper:focus-within {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(255, 107, 71, 0.1);
    }
    .form-group .input-wrapper .input-icon {
      padding: 0 0 0 16px;
      color: var(--text-dim);
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .form-group .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 12px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--paper);
      font-size: 0.95rem;
      font-family: var(--body);
    }
    .form-group .input-wrapper input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }
    .form-group .input-wrapper .toggle-password {
      padding: 0 16px 0 0;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
      background: transparent;
      border: none;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-group .input-wrapper .toggle-password:hover {
      color: var(--paper);
    }
    .form-group .input-wrapper .toggle-password:focus-visible {
      outline: 2px solid var(--amber);
      border-radius: 4px;
    }
    .form-group .input-wrapper .toggle-password i {
      pointer-events: none;
    }

    .validation-msg {
      font-size: 0.78rem;
      color: var(--coral);
      margin-top: 6px;
      display: none;
      font-family: var(--mono);
    }
    .validation-msg.show {
      display: block;
    }
    .validation-msg.success {
      color: #4BC04B;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0 24px;
    }
    .form-options .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
    }
    .form-options .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--coral);
      cursor: pointer;
    }
    .form-options .forgot-password {
      color: var(--text-dim);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .form-options .forgot-password:hover {
      color: var(--paper);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--coral);
      color: var(--ink);
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--body);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }
    .login-btn:hover::before {
      left: 100%;
    }
    .login-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(255, 107, 71, 0.3);
    }
    .login-btn:active {
      transform: translateY(0) scale(0.98);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-family: var(--mono);
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .create-account {
      text-align: center;
      margin-top: 8px;
    }
    .create-account p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .create-account a {
      color: var(--coral);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .create-account a:hover {
      color: var(--amber);
    }

    .error-msg {
      background: rgba(255, 107, 71, 0.1);
      border: 1px solid rgba(255, 107, 71, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--coral);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .error-msg.show {
      display: flex;
    }
    .error-msg i {
      font-size: 1rem;
    }

    .demo-credentials {
      margin-top: 20px;
      padding: 16px;
      background: var(--ink-soft-2);
      border-radius: 12px;
      border: 1px solid var(--line);
    }
    .demo-credentials p {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-family: var(--mono);
      text-align: center;
      line-height: 1.6;
    }
    .demo-credentials .cred-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .demo-credentials .cred-row span {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: var(--mono);
    }
    .demo-credentials .cred-row .highlight {
      color: var(--amber);
    }

    @media (max-width: 480px) {
      .login-wrapper {
        padding: 10px;
      }
      .login-container {
        padding: 32px 24px 28px;
      }
      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
      .role-selector {
        flex-direction: row;
      }
      .back-home {
        left: 10px;
        font-size: 0.8rem;
        padding: 6px 10px;
      }
      .demo-credentials .cred-row {
        flex-direction: column;
        gap: 4px;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container">
      <div class="login-logo">
        <h1>Signal<span>.</span></h1>
        <p>Sign in to your account</p>
      </div>

      <div class="role-selector">
        <button class="role-btn active" data-role="user" id="userRole">
          <i class="fas fa-user"></i> User
        </button>
        <button class="role-btn" data-role="admin" id="adminRole">
          <i class="fas fa-user-shield"></i> Admin
        </button>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Invalid credentials. Please try again.</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input
              type="email"
              id="email"
              placeholder="Enter your Gmail address"
              required
              autocomplete="email"
            />
          </div>
          <div class="validation-msg" id="emailValidation">
            <i class="fas fa-info-circle"></i> Please enter a valid Gmail address (@gmail.com)
          </div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" /> Remember me
          </label>
          <a href="404.html" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <div class="create-account">
        <p>Don't have an account? <a href="register.html">Create one now</a></p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePassword = document.getElementById('togglePassword');
      const toggleIcon = document.getElementById('toggleIcon');
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const emailValidation = document.getElementById('emailValidation');
      const userRoleBtn = document.getElementById('userRole');
      const adminRoleBtn = document.getElementById('adminRole');

      let selectedRole = 'user';
      let isPasswordVisible = false;

      // --- Role Selection ---
      function setRole(role) {
        selectedRole = role;
        [userRoleBtn, adminRoleBtn].forEach(btn => btn.classList.remove('active'));
        if (role === 'user') userRoleBtn.classList.add('active');
        else adminRoleBtn.classList.add('active');
        hideError();
        validateEmail();
      }

      userRoleBtn.addEventListener('click', () => setRole('user'));
      adminRoleBtn.addEventListener('click', () => setRole('admin'));

      // --- Email Validation (only Gmail) ---
      function validateEmail() {
        const email = emailInput.value.trim();
        const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

        if (email.length > 0 && !gmailRegex.test(email)) {
          emailValidation.classList.add('show');
          emailValidation.classList.remove('success');
          return false;
        } else if (email.length > 0 && gmailRegex.test(email)) {
          emailValidation.classList.remove('show');
          emailValidation.classList.remove('success');
          return true;
        } else {
          emailValidation.classList.remove('show');
          emailValidation.classList.remove('success');
          return false;
        }
      }

      emailInput.addEventListener('input', () => { validateEmail(); hideError(); });
      emailInput.addEventListener('blur', validateEmail);

      // --- Password Toggle ---
      togglePassword.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isPasswordVisible = !isPasswordVisible;
        passwordInput.type = isPasswordVisible ? 'text' : 'password';
        toggleIcon.className = isPasswordVisible ? 'fas fa-eye-slash' : 'fas fa-eye';
        passwordInput.focus();
      });

      togglePassword.addEventListener('mousedown', (e) => e.preventDefault());

      // --- Error handling ---
      function showError(message) {
        errorText.textContent = message || 'Invalid credentials. Please try again.';
        errorMsg.classList.add('show');
      }

      function hideError() {
        errorMsg.classList.remove('show');
      }

      // --- Login handler: accepts ANY Gmail + any password (min 4 chars) ---
      function handleLogin(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

        if (!gmailRegex.test(email)) {
          showError('Please enter a valid Gmail address (@gmail.com)');
          emailInput.focus();
          return;
        }

        if (password.length < 4) {
          showError('Password must be at least 4 characters');
          passwordInput.focus();
          return;
        }

        // ✅ Accept ANY Gmail + any password (>=4 chars)
        // For demo, we just simulate a successful login.
        // Store login state and redirect based on role.
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userRole', selectedRole);
        localStorage.setItem('userEmail', email);

        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        loginBtn.disabled = true;

        setTimeout(() => {
          const redirectUrl = (selectedRole === 'admin') ? 'admindashboard.html' : 'dashboard.html';
          window.location.href = redirectUrl;
        }, 800);
      } 


      loginForm.addEventListener('submit', handleLogin);

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });

      emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      // --- Init ---
      setRole('user');
      hideError();
      console.log('🔐 Signal Login — any Gmail + password (≥4 chars) works');
    })();
  </script>

</body>
</html>
