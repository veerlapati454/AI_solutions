<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal — Header (hamburger + full-width)</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ----- reset & base (scoped to header only) ----- */
    .site-header * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .site-header {
      background: #0B0E14 !important;
      border-bottom: 1px solid rgba(246,244,238,0.12) !important;
      position: relative !important;
      overflow: visible !important;
      z-index: 1000 !important;
      width: 100% !important;
      display: block !important;
    }

    .nav {
      max-width: 1180px !important;
      margin: 0 auto !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 22px 32px !important;
      position: relative !important;
    }

    /* ----- brand: logo placeholder ----- */
    .brand {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif !important;
      font-weight: 700 !important;
      font-size: 1.15rem !important;
      letter-spacing: -0.01em !important;
      flex-shrink: 0 !important;
    }

    .logo-placeholder {
      display: block !important;
      width: 130px !important;
      height: auto !important;
      max-height: 40px !important;
      object-fit: contain !important;
      filter: brightness(0) invert(1) !important;
    }

    /* ----- desktop nav links ----- */
    .nav-links {
      display: flex !important;
      gap: 36px !important;
      list-style: none !important;
      font-size: 0.94rem !important;
      color: rgba(246,244,238,0.62) !important;
      align-items: center !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .nav-links li {
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .nav-links a { 
      transition: color .18s ease !important;
      position: relative !important;
      padding: 4px 0 !important;
      white-space: nowrap !important;
      color: rgba(246,244,238,0.62) !important;
      text-decoration: none !important;
      font-size: 0.94rem !important;
    }
    .nav-links a.active::after {
      content: '' !important;
      position: absolute !important;
      bottom: -4px !important;
      left: 0 !important;
      width: 100% !important;
      height: 2px !important;
      background: linear-gradient(90deg, #FF6B47, #FFC24B) !important;
    }
    .nav-links a:hover { color: #F6F4EE !important; }
    .nav-links a.active { color: #F6F4EE !important; }

    /* desktop actions */
    .nav-actions {
      display: flex !important;
      align-items: center !important;
      gap: 18px !important;
      flex-shrink: 0 !important;
    }

    .btn-cta {
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif !important;
      font-weight: 600 !important;
      font-size: 0.9rem !important;
      background: #FF6B47 !important;
      color: #0B0E14 !important;
      padding: 10px 20px !important;
      border-radius: 100px !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 8px !important;
      transition: transform .18s ease, box-shadow .18s ease !important;
      border: none !important;
      cursor: pointer !important;
      text-decoration: none !important;
    }
    .btn-cta:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 8px 24px rgba(255,107,71,0.35) !important;
    }

    /* ----- hamburger toggle (hidden on desktop) ----- */
    .menu-toggle {
      display: none !important;
      background: none !important;
      border: 1px solid rgba(246,244,238,0.12) !important;
      border-radius: 8px !important;
      width: 44px !important;
      height: 44px !important;
      color: #F6F4EE !important;
      font-size: 1.6rem !important;
      cursor: pointer !important;
      line-height: 1 !important;
      padding: 0 !important;
      flex-shrink: 0 !important;
      transition: background 0.2s, border-color 0.2s !important;
      z-index: 1001 !important;
      position: relative !important;
    }
    .menu-toggle:hover {
      background: rgba(246,244,238,0.08) !important;
      border-color: rgba(246,244,238,0.25) !important;
    }
    .menu-toggle:active {
      transform: scale(0.95) !important;
    }

    /* ----- mobile menu overlay (full-width, centered) ----- */
    .mobile-menu {
      display: none !important;
      position: absolute !important;
      top: 100% !important;
      left: 0 !important;
      width: 100% !important;
      background: #0B0E14 !important;
      border-bottom: 1px solid rgba(246,244,238,0.12) !important;
      padding: 32px 24px 40px !important;
      flex-direction: column !important;
      align-items: center !important;
      gap: 32px !important;
      z-index: 999 !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important;
      animation: slideDown 0.3s ease-out !important;
    }
    .mobile-menu.open {
      display: flex !important;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mobile-menu .mobile-links {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      gap: 28px !important;
      list-style: none !important;
      width: 100% !important;
      padding: 0 !important;
      margin: 0 !important;
    }
    .mobile-menu .mobile-links li {
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .mobile-menu .mobile-links a {
      font-size: 1.3rem !important;
      color: rgba(246,244,238,0.72) !important;
      transition: color 0.2s, border-color 0.2s !important;
      padding: 8px 0 !important;
      border-bottom: 2px solid transparent !important;
      text-decoration: none !important;
      font-weight: 500 !important;
      width: 100% !important;
      text-align: center !important;
      display: block !important;
    }

    .mobile-menu .mobile-links a:hover {
      color: #F6F4EE !important;
    }

    .mobile-menu .mobile-links a.active {
      color: #F6F4EE !important;
      border-bottom-color: #FF6B47 !important;
    }

    /* mobile "sign in" button – moved inside hamburger menu */
    .mobile-signin {
      margin-top: 8px !important;
      width: 100% !important;
      max-width: 240px !important;
      display: flex !important;
      justify-content: center !important;
    }

    .mobile-signin .btn-cta {
      width: 100% !important;
      justify-content: center !important;
      font-size: 1.05rem !important;
      padding: 14px 20px !important;
    }

    /* hide desktop signin on mobile */
    .desktop-signin {
      display: inline-flex !important;
    }

    /* ----- responsive breakpoints ----- */
    @media (max-width: 860px) {
      .nav-links {
        display: none !important;
      }
      .menu-toggle {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      .desktop-signin {
        display: none !important;
      }
      .nav {
        padding: 16px 20px !important;
      }
      .site-header {
        overflow: visible !important;
      }
    }

    @media (max-width: 480px) {
      .logo-placeholder {
        width: 100px !important;
        max-height: 32px !important;
      }
      .mobile-menu {
        padding: 28px 16px 36px !important;
        gap: 24px !important;
      }
      .mobile-menu .mobile-links {
        gap: 20px !important;
      }
      .mobile-menu .mobile-links a {
        font-size: 1.1rem !important;
        padding: 6px 0 !important;
      }
      .mobile-signin {
        max-width: 200px !important;
      }
      .mobile-signin .btn-cta {
        font-size: 0.95rem !important;
        padding: 12px 16px !important;
      }
      .menu-toggle {
        width: 40px !important;
        height: 40px !important;
        font-size: 1.4rem !important;
      }
    }

    /* prevent body scroll when menu is open */
    .no-scroll {
      overflow: hidden !important;
      height: 100% !important;
      position: fixed !important;
      width: 100% !important;
    }
  </style>
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <!-- BRAND: logo image -->
    <a href="index.html" class="brand">
      <img 
        class="logo-placeholder" 
        src="./assets/stackly_logo.webp"
        alt="Your logo placeholder"
      />
    </a>

    <!-- desktop nav links -->
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="platform.html">Platform</a></li>
      <li><a href="solutions.html">Solutions</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="docs.html">Docs</a></li>
      <li><a href="company.html">Company</a></li>
    </ul>

    <!-- desktop actions: sign in button (hidden on mobile) -->
    <div class="nav-actions">
      <a href="login.html" class="btn-cta desktop-signin">Sign in</a>
    </div>

    <!-- hamburger toggle -->
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span class="hamburger-icon">☰</span>
    </button>
  </nav>

  <!-- mobile menu (full-width, centered) -->
  <div class="mobile-menu" id="mobileMenu">
    <ul class="mobile-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="platform.html">Platform</a></li>
      <li><a href="solutions.html">Solutions</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="docs.html">Docs</a></li>
      <li><a href="company.html">Company</a></li>
    </ul>
    <!-- sign in button moved inside hamburger menu -->
    <div class="mobile-signin">
      <a href="login.html" class="btn-cta">Sign in</a>
    </div>
  </div>
</header>

<script>
  (function() {
    console.log('🚀 Header script running...');
    
    // Force re-initialization after a small delay
    function initHeader() {
      // 1) Highlight active link
      function setActiveLinks() {
        let currentPage = window.location.pathname.split('/').pop();
        if (!currentPage || currentPage === '') currentPage = 'index.html';
        
        document.querySelectorAll('.nav-links a, .mobile-links a').forEach(link => {
          link.classList.remove('active');
          if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
          }
        });
      }
      setActiveLinks();

      // 2) Hamburger toggle
      const toggleBtn = document.getElementById('menuToggle');
      const mobileMenu = document.getElementById('mobileMenu');
      
      if (!toggleBtn || !mobileMenu) {
        console.warn('⚠️ Header elements not found, retrying...');
        // Retry after a short delay
        setTimeout(initHeader, 100);
        return;
      }
      
      let menuOpen = false;

      function toggleMenu() {
        menuOpen = !menuOpen;
        mobileMenu.classList.toggle('open', menuOpen);
        
        const icon = toggleBtn.querySelector('.hamburger-icon');
        if (icon) {
          icon.textContent = menuOpen ? '✕' : '☰';
        }
        toggleBtn.setAttribute('aria-label', menuOpen ? 'Close menu' : 'Open menu');
        toggleBtn.setAttribute('aria-expanded', menuOpen);
        
        if (menuOpen) {
          document.body.classList.add('no-scroll');
        } else {
          document.body.classList.remove('no-scroll');
        }
      }

      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMenu();
      });

      document.querySelectorAll('.mobile-links a').forEach(link => {
        link.addEventListener('click', function() {
          if (menuOpen) toggleMenu();
        });
      });

      document.addEventListener('click', function(e) {
        const header = document.querySelector('.site-header');
        if (menuOpen && header && !header.contains(e.target)) {
          toggleMenu();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menuOpen) {
          toggleMenu();
        }
      });

      let resizeTimeout;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
          if (window.innerWidth > 860 && menuOpen) {
            toggleMenu();
          }
        }, 250);
      });

      console.log('✅ Header initialized successfully');
    }

    // Try to initialize immediately
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(initHeader, 50);
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(initHeader, 50);
      });
    }

    // Also retry after a delay in case of dynamic loading
    setTimeout(initHeader, 200);
    setTimeout(initHeader, 500);
    setTimeout(initHeader, 1000);

  })();
</script>

</body>
</html>
